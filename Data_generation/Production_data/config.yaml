# ----Products------------------------
products:
 total: 100
 price_range:
  min: 29
  max: 1499

product_categories:
 dairy:
  shelf_life_days: [3,14]
  storage_zone: "cold"
  rto_rate_base: 0.08 # higher-perishable damage
 beverages:
  shelf_life_days: [90, 365]
  storage_zone: "beverage"
  rto_rate_base: 0.03
 staples:
  shelf_life_days: [180, 730]
  storage_zone: "dry"
  rto_rate_base: 0.02
 snacks:
  shelf_life_days: [60,180]
  storage_zone: "dry"
  rto_rate_base: 0.02
 personal_care:
  shelf_life_days: [365, 1095]
  storage_zone: "dry"
  rto_rate_base: 0.04
 household:
  shelf_life_days: [365,1095]
  storage_zone: "dry"
  rto_rate_base: 0.03
 frozen:
  shelf_life_days: [60,180]
  storage_zone: "cold"
  rto_rate_base: 0.06



# ---Scanners----------------------------

scanner:
 firmware_versions: ["v1.1.0", "v1.2.3", "v2.0.1", "v2.1.4"]
 firmware_release_dates:
  "v1.1.0": "2024-01-15" # oldest versions have more chaos risk
  "v1.2.3": "2024-06-20"
  'v2.0.1': "2025-01-10"
  "v2.1.4": "2025-09-10" # newest versions have less chaos risk
 latency_ms:
  good: [50,150]
  degraded: [400,800]
 degraded_fraction: 0.15 # 15% of the scanners have bad latency
 dead_rtc_fraction: 0.10 # scanners with dead rtc (real-time-clock) battery (triggers utc drift in nb3)
  
scanner_zone_types:
 inbound: {fraction: 0.30, chaos_affinity: "utc_drift"}
 outbound: {fraction: 0.30, chaos_affinity: "duplicate_echo"}
 returns: {fraction: 0.20, chaos_affinity: "null_rto_reason"}
 stock_count: {fraction: 0.20, chaos_affinity: "batch_heartbeat"}

# ---Snapshot Schedules-------------------

snapshot_schedule:
 darkstore:
  - "06:00" # morning opening count
  - "13:00" # peak afternoon check
  - "18:00" # pre-evening evening peak check (6-9pm)
  - "23:30" # midnight EOD reconciliation
 regional_hub:
  - "22:00" # after darkstore transfer window closes
  - "05:00" # after overnight mother hub delivery arrives

 mother_hub:
  - "20:00" # end of supplier receiving window
  - "04:00" # after overnight regional hub dispatch completes


