  metropolitan: [0.15, 0.30]
  tier_1: [0.12, 0.22]
  tier_2: [0.08, 0.15]
 beverage_fraction:
  metropolitan: [0.10, 0.20]
  tier_1: [0.10, 0.18]
  tier_2: [0.08, 0.15]

# -------Suppliers--------------------------
suppliers:
 total: 19
 edi_formats:
  API: { fraction: 0.25, quality_score_range: [0.85, 0.99]}
  SFTP_CSV: { fraction: 0.35, quality_score_range: [0.65,0.85]}
  SFTP_XML: { fraction: 0.25, quality_score_range: [0.55, 0.78]}
  email_manual: { fraction: 0.15, quality_score_range: [0.20, 0.45]}

# -------Transfer windows--------------------
transfer_windows:
 mother_hub_to_regional_hub: "01:00-04:00" # deep night
 regional_hub_to_darkstore: "03:00-06:00" # pre opening
 lateral_darkstore: "10:00-16:00" # off peak hours only

# -------Replenishment-----------------------
replenishment:
 reorder_trigger_fraction: 0.30 # trigger when stock <30% of capacity
 top_up_target_fraction: 0.80 # fill to 80% capacity
 lateral_transfer_min_surplus: 20 # only transfer if source has 20+ unit surplus
 lateral_transfer_fraction: 0.50 # transfer 50% of surplus

