## PhantomProof - master data configuration
## controls NB1 generation parameters

simulation:
 start_date: "2025-12-01"
 end_date: "2026-06-30"
 random_seed: 42

city_distribution:
 metropolitan: 0.60 # 60% of the nodes lie in metropolitan cities
 tier_1: 0.30 # 30% nodes lie in tier1 cities
 tier_2: 0.10 # 10% of the nodes lie in tier_2 cities

# ------ NODE HIERARCHY ---------------

